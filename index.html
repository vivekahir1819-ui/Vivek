<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>વિવેકનું ખેતર અને ડેરી ફાર્મ 🚜</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f7f9f2; margin: 0; padding: 10px; }
        .game-box { max-width: 450px; margin: auto; background: white; border: 4px solid #4CAF50; border-radius: 20px; padding: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        h1 { color: #2e7d32; font-size: 22px; margin-bottom: 5px; }
        .stats { display: flex; justify-content: space-around; background: #e8f5e9; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; font-size: 18px; color: #1b5e20; border: 1px solid #c8e6c9; }
        .farm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .plot { height: 110px; background: #8d6e63; border: 3px solid #5d4037; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 40px; transition: 0.2s; position: relative; }
        .plot:active { transform: scale(0.95); }
        .plot b { font-size: 12px; color: white; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 5px; margin-top: 5px; }
        .status-msg { margin-top: 15px; font-size: 14px; color: #555; background: #fffde7; padding: 5px; border-radius: 5px; }
        .btn-reset { margin-top: 15px; background: #f44336; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="game-box">
        <h1>🚜 વિવેક ફાર્મિંગ 🌾</h1>
        
        <div class="stats">
            <span>પૈસા: ₹<span id="money">100</span></span>
        </div>

        <div class="farm-grid">
            <div class="plot" onclick="clickPlot(0)" id="p0">🟫<b>ખાલી ખેતર</b></div>
            <div class="plot" onclick="clickPlot(1)" id="p1">🟫<b>ખાલી ખેતર</b></div>
            <div class="plot" onclick="clickPlot(2)" id="p2">🐄<b>ડેરી ફાર્મ</b></div>
            <div class="plot" onclick="clickPlot(3)" id="p3">🟫<b>ખાલી ખેતર</b></div>
        </div>

        <div class="status-msg" id="msg">ખેતરમાં વાવણી કરવા ક્લિક કરો (ખર્ચ ₹20)</div>
        
        <button class="btn-reset" onclick="location.reload()">ફરીથી શરૂ કરો</button>
    </div>

    <script>
        let money = 100;
        let plots = ["empty", "empty", "cow", "empty"];

        function clickPlot(id) {
            let el = document.getElementById('p' + id);
            let msg = document.getElementById('msg');

            // ૧. જો ખેતર ખાલી હોય તો વાવણી કરો (ખર્ચ ૨૦)
            if (plots[id] === "empty") {
                if (money >= 20) {
                    money -= 20;
                    plots[id] = "growing";
                    el.innerHTML = "🌱<b>વાવણી કરી...</b>";
                    el.style.background = "#aed581";
                    updateStats();
                    msg.innerText = "પાક ઉગી રહ્યો છે, થોડી રાહ જુઓ...";

                    setTimeout(() => {
                        plots[id] = "ready";
                        el.innerHTML = "🌽<b>પાક તૈયાર</b>";
                        el.style.background = "#ffeb3b";
                        msg.innerText = "પાક તૈયાર! લણણી કરવા ક્લિક કરો.";
                    }, 4000);
                } else {
                    msg.innerText = "પૈસા નથી! પાક વેચીને કમાણી કરો.";
                }
            } 
            // ૨. તૈયાર પાકની લણણી (કમાણી ૫૦)
            else if (plots[id] === "ready") {
                money += 50;
                plots[id] = "empty";
                el.innerHTML = "🟫<b>ખાલી ખેતર</b>";
                el.style.background = "#8d6e63";
                updateStats();
                msg.innerText = "પાક વેચાયો! ₹50 મળ્યા.";
            }
            // ૩. ડેરી ફાર્મ (ગાયમાંથી દૂધ - કમાણી ૧૦)
            else if (plots[id] === "cow") {
                money += 10;
                updateStats();
                msg.innerText = "ગાયનું દૂધ વેચ્યું! ₹10 મળ્યા.";
                el.style.transform = "scale(1.1)";
                setTimeout(() => el.style.transform = "scale(1)", 100);
            }
        }

        function updateStats() {
            document.getElementById('money').innerText = money;
        }
    </script>

</body>
</html>
