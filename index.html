<!DOCTYPE html>
<html lang="gu">
<head>

    <title>Ramdev Dairy Farm & Tractor Simulation 3D</title>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            pointer-events: none;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        button {
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            pointer-events: auto;
        }
        #buy-btn { background: #27ae60; color: white; }
        #horn-btn { background: #f1c40f; }
        #tochan-btn { background: #e67e22; color: white; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2>રામદેવ ડેરી ફાર્મ 🐄</h2>
        <p>સ્કોર: <span id="score">0</span></p>
        <p>ટ્રેક્ટર: <span id="status">Lock</span></p>
    </div>

    <div class="controls">
        <button id="buy-btn">₹5 માં ટ્રેક્ટર ખરીદો 🚜</button>
        <button id="horn-btn">મોટા હોર્ન 📣</button>
        <button id="tochan-btn">ટોચન મોડ 🔗</button>
        <button id="music-btn" onclick="toggleMusic()">ગીત વગાડો 🎵</button>
    </div>

    <script>
        // --- 1. Basic 3D Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // આકાશનો કલર

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. Lighting ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- 3. The Ground (ખેતર/ફાર્મ) ---

        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2d5a27 }); // લીલું ઘાસ
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- 4. Tractor Model (Swaraj Style - Placeholder) ---
        const tractorGroup = new THREE.Group();
        const bodyGeom = new THREE.BoxGeometry(1, 1, 2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000 }); // લાલ ટ્રેક્ટર
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        tractorGroup.add(body);

        // ટાયર ઉમેરવા
        const wheelGeom = new THREE.CylinderGeometry(0.4, 0.4, 0.4, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const w1 = new THREE.Mesh(wheelGeom, wheelMat);
        w1.rotation.z = Math.PI / 2;
        w1.position.set(0.6, -0.2, 0.7);
        tractorGroup.add(w1);

        tractorGroup.position.y = 0.6;
        scene.add(tractorGroup);

        camera.position.set(0, 5, 10);
        camera.lookAt(tractorGroup.position);
